spring.application.name=yousre_db

# DATABASE (PostgreSQL cloud)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Port - Render utilise la variable PORT
server.port=${PORT:8080}

# JWT
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.access-minutes=15
app.jwt.refresh-days=30

# TVA
app.tva.activee=true
app.tva.taux-par-defaut=0.18

# Admin (idéalement à mettre en ENV aussi)
app.admin.email=${ADMIN_EMAIL}
app.admin.mot-de-passe=${ADMIN_PASSWORD}
app.admin.nom=Admin
app.admin.prenom=Principal

# Cron / règles métier
app.alertes.cron=0 */10 * * * *
app.alertes.facture.echeance-jours=3
app.alertes.compte.solde-faible-seuil=0.00
app.dashboard.echeance-prochaine-jours=3

# Static files
spring.web.resources.static-locations=file:src/main/resources/static/

# Devise
app.devise=XOF