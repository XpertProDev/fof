spring.application.name=yousre_db

# Database (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/yousre_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# JPA/Hibernate
# Dev: crée/ajuste automatiquement les tables si elles n'existent pas.
# Prod: utilise validate + exécute les migrations SQL manuellement (MyAdmin).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Migrations
spring.flyway.enabled=false

# Server
server.port=8080

# TVA (config entreprise)
app.tva.activee=true
app.tva.taux-par-defaut=0.18

# JWT (sécurité)
app.jwt.secret=${APP_JWT_SECRET:Tb2YQdiNbWuc4Qo3xiPE6YNXVRmvu05zRr42uAEzzS7HQXNSMAGHKPl+wVEC8wI0NOILT9PXetx283xPIxszpA==}
app.jwt.access-minutes=15
app.jwt.refresh-days=30

# Admin (seed au démarrage)
app.admin.email=admin@gmail.com
app.admin.mot-de-passe=password123
app.admin.nom=Admin
app.admin.prenom=Principal

# Alertes/Notifications (jobs planifiés)
app.alertes.cron=0 */10 * * * *
app.alertes.facture.echeance-jours=3
app.alertes.compte.solde-faible-seuil=0.00

# Dashboard (fenêtre « échéances proches », en jours calendaires à partir d’aujourd’hui inclus)
app.dashboard.echeance-prochaine-jours=3

# Stockage fichiers (images)
spring.web.resources.static-locations=file:src/main/resources/static/

# Devise globale (ISO)
app.devise=XOF